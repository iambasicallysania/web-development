<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position property in css</title>
    <link rel="stylesheet" href="position.css">
</head>
<body>
    <h1>position property in css</h1>
    <div class="parent1">
  <div class="box1">A</div>
  <div class="box2">B (absolute)</div>
  <div class="box3">C</div>
</div>

<div class="parent2">
  <div class="box11">A</div>
  <div class="box22">B(relative)</div>
  <div class="box33">C</div>
</div>

<div class="parent3">
  <div class="box111">A</div>
  <div class="box222">B(static)</div>
  <div class="box333">C</div>
</div>

<div class="parent4">
  <div class="box4">A</div>
  <div class="box44">B(fixed)</div>
  <div class="box444">C</div>
</div>

<div class="parent5">
  <div class="box55">A</div>
  <div class="box555">B(sticky)</div>
  <div class="box5555">C</div>
</div>

</body>
</html>
